<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento confirmado — Global Mantos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A; color: #F5F5F0;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .icon { font-size: 5rem; margin-bottom: 1.5rem; animation: pop 0.5s ease; }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 2px; color: #00C65E; margin-bottom: 0.75rem; }
  p { color: rgba(245,245,240,0.55); font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
  a {
    display: inline-block; background: #00C65E; color: #0A0A0A;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px;
    padding: 12px 28px; border-radius: 4px; text-decoration: none; transition: background 0.2s;
  }
  a:hover { background: #00FF7F; }
</style>
</head>
<body>
  <div>
    <div class="icon">⚽</div>
    <h1>Pagamento confirmado!</h1>
    <p>Obrigado pela compra. Você receberá um e-mail de confirmação em breve.</p>
    <a href="/">Voltar à loja</a>
  </div>
</body>
</html>
